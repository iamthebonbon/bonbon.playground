AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PoC - Invoke Claude API from a Java 17 Lambda

Globals:
  Function:
    Runtime: java17
    MemorySize: 512
    Timeout: 30

Resources:
  ServerlessHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          ApiKeyAuthorizer:
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Headers:
                - x-api-key
              ReauthorizeEvery: 300
        DefaultAuthorizer: ApiKeyAuthorizer

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.bonbon.lambda.Authorizer::handleRequest
      CodeUri: .
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/bonbon/api-key'

  ClaudeInvokeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.bonbon.lambda.Handler::handleRequest
      CodeUri: .
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /
            Method: post
            ApiId: !Ref ServerlessHttpApi
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/bonbon/anthropic-api-key'

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/'
